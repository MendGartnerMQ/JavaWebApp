yaml
name: Mend CLI SCA Policy Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  policy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build/install dependencies first (example for Node.js; replace with your build steps)
      - name: Install dependencies
        run: npm ci

      - name: Download Mend CLI
        run: |
          curl https://downloads.mend.io/cli/linux_amd64/mend -o /usr/local/bin/mend
          chmod +x /usr/local/bin/mend

      - name: Mend SCA scan (fail on policy violation)
        env:
          MEND_EMAIL: ${{ secrets.MEND_EMAIL }}
          MEND_USER_KEY: ${{ secrets.MEND_USER_KEY }}
          MEND_URL: https://saas.mend.io
        run: |
          # Scope uses the logged-in org; app/project set from repo name and branch
          mend dep --fail-policy -s "*//${{ github.event.repository.name }}//${{ github.ref_name }}"
